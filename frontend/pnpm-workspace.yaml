# pnpm 11 refuses to run a dependency's build script unless it is named here, and errors out on
# any it was never told about — so this list is a decision record, not an optimisation.
#
#   esbuild — vite's bundler; it compiles a platform binary on install and cannot build without it.
#
# @open-lzt/ui is deliberately absent: it ships its own dist/ and no longer declares a build script.
# It used to, and that was the bug — the build re-ran on every install, wiped the shipped output and
# regenerated a stub .d.ts, so consumers typechecked against a package with no exported members.

# This file's other job is declaring a workspace, and pnpm refuses to install without a non-empty
# `packages` — "packages field missing or empty". There is only one package here: this directory.
packages:
  - '.'

allowBuilds:
  esbuild: true
