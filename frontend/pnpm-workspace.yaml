# pnpm 11 refuses to run a dependency's build scripts unless it is named here.
#
#   esbuild — vite's bundler; it compiles a platform binary on install and cannot build without it.
#
#   @open-lzt/ui — our own UI kit. It now ships its own dist/ (a git dependency arrives as a tarball
#     and its build script never runs, so the build output had to be committed), but pnpm still
#     ERRORS on any dependency that merely *declares* a build script it has not been told about.
#     The key is the full spec including the commit sha, so it moves with pnpm-lock.yaml.

# This file's other job is declaring a workspace, and pnpm refuses to install without a non-empty
# `packages` — "packages field missing or empty". There is only one package here: this directory.
packages:
  - '.'

allowBuilds:
  '@open-lzt/ui@https://codeload.github.com/open-lzt/lzt-ui/tar.gz/0975a6e99dfd36c3b544ead211addff948263e17': true
  esbuild: true
