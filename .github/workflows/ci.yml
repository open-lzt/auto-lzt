name: CI

# The published default branch is `main` — the trigger must name it or pushes run no CI.
# workflow_dispatch lets CI be proven on demand instead of by pushing a commit and reading the tab.
on:
  push:
    branches: [main, "feat/**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync --extra dev --frozen
      - name: Ruff
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy app
      - name: Pytest
        run: uv run pytest --cov=app --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Build
        run: pnpm build

  # Final gate: the no-Docker core loop against the mock market. No live token, no external
  # services — proves compile -> run -> completed on every commit (closes the open CI question).
  smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync --extra dev --frozen
      - name: Smoke (mock-backed core loop)
        run: bash scripts/smoke.sh
