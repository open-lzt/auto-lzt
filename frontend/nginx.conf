server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Same /api prefix-strip proxy as the Vite dev server (vite.config.ts) — the SPA never
    # hardcodes a backend host, dev and prod both go through /api.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri /index.html;
    }
}
